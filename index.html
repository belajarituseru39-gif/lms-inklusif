function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const bgClass = type === 'error' ? 'bg-red-500' : (type === 'warning' ? 'bg-amber-500' : 'bg-emerald-500');
    const icon = type === 'error' ? 'fa-exclamation-circle' : (type === 'warning' ? 'fa-info-circle' : 'fa-check-circle');
    
    toast.className = `${bgClass} text-white px-5 py-4 rounded-xl shadow-2xl font-medium flex items-center gap-3 slide-up`;
    toast.innerHTML = `<i class="fas ${icon} text-xl"></i> <span>${msg}</span>`;
    
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-20px)';
        toast.style.transition = 'all 0.4s ease';
        setTimeout(() => toast.remove(), 400);
    }, 3500);
}

function renderMateri(id) {
    const data = materiData.find(m => m.id === id);
    const score = state.scores[id];
    const submitted = score !== null;

    let qsHtml = data.questions.map((q, idx) => {
        let optsHtml = q.a.map((opt, optIdx) => {
            const isChecked = state.tempAnswers[idx] === optIdx;
            let bgClass = isChecked ? 'bg-indigo-50 border-indigo-400 ring-1 ring-indigo-400' : 'bg-white border-slate-200 hover:bg-slate-50';
            if (submitted) {
                if (q.c === optIdx) bgClass = 'bg-emerald-50 border-emerald-400 ring-1 ring-emerald-400 font-semibold text-emerald-900';
                else if (isChecked && q.c !== optIdx) bgClass = 'bg-red-50 border-red-300 text-red-800';
            }

            return `
                <label class="flex items-start gap-3 p-4 rounded-xl border cursor-pointer transition-all ${bgClass}">
                    <input type="radio" name="materi_${id}_q${idx}" class="mt-1 w-4 h-4 text-indigo-600 focus:ring-indigo-500" ${submitted ? 'disabled' : ''} ${isChecked ? 'checked' : ''} onchange="setTempAnswer(${idx}, ${optIdx})">
                    <span class="text-sm md:text-base leading-snug flex-1">${opt}</span>
                </label>
            `;
        }).join('');

        return `
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mb-4">
                <p class="font-bold text-slate-700 mb-4 text-lg">${q.q}</p>
                <div class="space-y-3">${optsHtml}</div>
            </div>
        `;
    }).join('');

    let scoreAlert = '';
    if (submitted) {
        const alertClass = score >= 70 ? 'bg-emerald-50 text-emerald-800 border-emerald-200' : 'bg-amber-50 text-amber-800 border-amber-200';
        const icon = score >= 70 ? 'fa-star text-emerald-500' : 'fa-exclamation-triangle text-amber-500';
        scoreAlert = `
            <div class="p-6 rounded-2xl mb-8 flex flex-col items-center justify-center border-2 border-dashed ${alertClass}">
                <i class="fas ${icon} text-4xl mb-2"></i>
                <h3 class="text-2xl font-black">Nilai Kuis: ${score} / 100</h3>
            </div>`;
    }

    return `
        <div class="space-y-8 fade-in">
            <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">${data.title}</h2>
            <div class="relative w-full bg-slate-900 rounded-3xl overflow-hidden shadow-xl" style="padding-top: 56.25%;">
                <iframe class="absolute top-0 left-0 w-full h-full" src="${data.video}" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="mt-10 pt-10 border-t border-slate-200">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-12 h-12 rounded-xl bg-indigo-100 text-indigo-600 flex items-center justify-center text-xl"><i class="fas fa-pencil-alt"></i></div>
                    <h3 class="text-2xl font-bold text-slate-800">Uji Pemahaman</h3>
                </div>
                ${scoreAlert}
                <div class="space-y-6">${qsHtml}</div>
                ${!submitted ? `<button onclick="submitMateri('${id}')" class="w-full mt-8 bg-slate-800 hover:bg-slate-900 text-white font-bold py-5 rounded-2xl text-xl shadow-lg transition-all flex justify-center gap-3 items-center">Kumpulkan Jawaban <i class="fas fa-paper-plane"></i></button>` : ''}
            </div>
        </div>
    `;
}

function renderActivity() {
    const st = state.activityQuest;
    const l = st.currentLevel;
    const actData = activityData[l - 1];
    
    let navHtml = [1, 2, 3, 4, 5].map(lvl => {
        const isEval = st.scores[`l${lvl}`] !== null;
        const score = isEval ? st.scores[`l${lvl}`] : 0;
        const isUnlocked = lvl === 1 || (st.scores[`l${lvl-1}`] >= 80);
        
        let btnCls = `w-12 h-12 rounded-2xl flex items-center justify-center font-bold text-lg transition-all `;
        if(l === lvl) btnCls += 'ring-4 ring-indigo-200 shadow-md ';
        if(!isUnlocked) btnCls += 'bg-slate-100 text-slate-400 cursor-not-allowed border border-slate-200';
        else if(score >= 80) btnCls += 'bg-emerald-500 text-white shadow-emerald-200 shadow-lg';
        else btnCls += 'bg-indigo-600 text-white cursor-pointer shadow-indigo-200 shadow-lg';
        
        const content = !isUnlocked ? '<i class="fas fa-lock text-sm"></i>' : (score >= 80 ? lvl : lvl);
        return `<button class="${btnCls}" ${!isUnlocked ? 'disabled' : `onclick="changeQuestLevel(${lvl})"`}>${content}</button>`;
    }).join('');

    const levelScore = st.scores[`l${l}`];
    const isEvaluated = levelScore !== null;
    
    let questionsHtml = actData.q.map((q, idx) => {
        let optionsHtml = q.a.map((opt, optIdx) => {
            const isChecked = st.tempAnswers[idx] === optIdx;
            let bgCls = isChecked ? 'bg-indigo-50 border-indigo-400 ring-1 ring-indigo-400' : 'bg-white border-slate-200 hover:bg-slate-50';
            
            if (isEvaluated) {
                if (q.c === optIdx) bgCls = 'bg-emerald-50 border-emerald-400 ring-1 ring-emerald-400 font-semibold text-emerald-900';
                else if (isChecked && q.c !== optIdx) bgCls = 'bg-red-50 border-red-300 text-red-800';
            }

            return `
                <label class="flex items-start gap-3 p-4 rounded-xl border cursor-pointer transition-all ${bgCls}">
                    <input type="radio" name="act_${l}_q${idx}" class="mt-1 w-4 h-4 text-indigo-600 focus:ring-indigo-500" 
                        ${isEvaluated ? 'disabled' : ''} ${isChecked ? 'checked' : ''} 
                        onchange="setActivityAnswer(${idx}, ${optIdx})">
                    <span class="text-sm md:text-base leading-snug flex-1">${opt}</span>
                </label>
            `;
        }).join('');

        return `
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm mb-4">
                <p class="font-bold text-slate-700 mb-4 text-lg">${q.text}</p>
                <div class="grid md:grid-cols-2 gap-3">${optionsHtml}</div>
            </div>
        `;
    }).join('');

    let predText = '';
    if(st.totalPoints >= 450) predText = '🏆 Champion of Inclusive Education';
    else if(st.totalPoints >= 400) predText = '🥇 Inclusive Education Expert';
    else if(st.totalPoints >= 350) predText = '🥈 Inclusive Education Practitioner';
    else if(st.totalPoints >= 300) predText = '🥉 Inclusive Education Explorer';
    else predText = 'Perlu Pendampingan Lanjutan';

    return `
        <div class="space-y-8 fade-in relative">
            <div class="flex flex-col md:flex-row items-center justify-between border-b border-slate-200 pb-6">
                <div>
                    <h2 class="text-3xl md:text-4xl font-extrabold text-slate-800 tracking-tight">Aktivitas Mandiri</h2>
                    <p class="text-slate-500 font-medium mt-2 text-lg">Sistem Penilaian Otomatis - Selesaikan Misi Anda</p>
                </div>
                <div class="mt-6 md:mt-0 flex flex-col items-end">
                    <div class="flex gap-3">${navHtml}</div>
                    <div class="mt-4 text-sm font-bold bg-slate-100 py-2 px-4 rounded-xl text-slate-600 border border-slate-200">
                        Total Poin: <span class="text-indigo-600 text-xl">${st.totalPoints}/500</span>
                    </div>
                </div>
            </div>
            
            ${st.totalPoints > 0 ? `<div class="bg-gradient-to-r from-amber-100 to-yellow-100 border border-amber-200 p-5 rounded-2xl text-center font-bold text-amber-900 shadow-sm text-lg">Pencapaian Saat Ini: ${predText}</div>` : ''}

            <div class="bg-white border border-slate-200 rounded-3xl p-6 md:p-8 shadow-sm">
                <div class="mb-8">
                    <h3 class="text-2xl md:text-3xl font-black text-indigo-900 mb-3">Level ${l}: ${actData.title}</h3>
                    <p class="text-slate-600 font-medium text-lg leading-relaxed">${actData.desc}</p>
                </div>
                
                ${isEvaluated ? `
                    <div class="mb-8 p-8 bg-emerald-50 border-2 border-emerald-400 border-dashed rounded-3xl text-center slide-up">
                        <h3 class="text-3xl font-black text-emerald-800">Skor Level ${l}: ${levelScore} / 100</h3>
                        <p class="text-emerald-600 font-medium mt-2 text-lg">Evaluasi otomatis selesai. Review jawaban Anda di bawah.</p>
                        ${levelScore < 80 ? `<button onclick="retryActivity(${l})" class="mt-5 px-8 py-3 bg-white border-2 border-emerald-300 text-emerald-700 rounded-xl text-base font-bold hover:bg-emerald-100 transition-all shadow-sm">Coba Ulang Level ${l}</button>` : ''}
                    </div>
                ` : ''}

                <div class="space-y-6">${questionsHtml}</div>
                
                ${!isEvaluated ? `
                    <button onclick="submitActivityLevel(${l})" class="w-full mt-10 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-xl transition-all flex justify-center gap-3 items-center text-xl">
                        Kirim & Evaluasi Sistem <i class="fas fa-cogs"></i>
                    </button>
                ` : ''}
            </div>
        </div>
    `;
}

function renderFinalTest() {
    const submitted = state.finalScore !== null;

    let qsHtml = finalTestHOTS.map((q, idx) => {
        let optsHtml = '';
        
        if (q.type === 'mcc') {
            optsHtml = q.options.map((opt, optIdx) => {
                const userAnsArr = state.tempAnswers[q.id] || [];
                const isChecked = userAnsArr.includes(optIdx);
                const isCorrectAns = q.a.includes(optIdx);
                
                let bgClass = isChecked ? 'bg-purple-50 border-purple-300 ring-1 ring-purple-300' : 'bg-white border-slate-200 hover:bg-slate-50';
                if (submitted) {
                    if (isCorrectAns) bgClass = 'bg-emerald-50 border-emerald-400 font-bold text-emerald-900 ring-1 ring-emerald-400';
                    else if (isChecked && !isCorrectAns) bgClass = 'bg-red-50 border-red-300 text-red-800';
                }

                return `
                    <label class="flex items-start gap-4 p-4 rounded-xl border cursor-pointer transition-all ${bgClass}">
                        <input type="checkbox" ${submitted ? 'disabled' : ''} ${isChecked ? 'checked' : ''} onchange="setTempAnswerFinalMCC(${q.id}, ${optIdx}, this.checked)" class="mt-1 h-5 w-5 rounded text-purple-600 focus:ring-purple-500">
                        <span class="text-sm md:text-base flex-1 leading-relaxed">${opt}</span>
                    </label>
                `;
            }).join('');
        } else {
            optsHtml = q.a.map((opt, optIdx) => {
                const isChecked = state.tempAnswers[q.id] === optIdx;
                let bgClass = isChecked ? 'bg-indigo-50 border-indigo-400 ring-1 ring-indigo-400' : 'bg-white border-slate-200 hover:bg-slate-50';
                if (submitted) {
                    if (q.c === optIdx) bgClass = 'bg-emerald-50 border-emerald-400 font-bold text-emerald-900 ring-1 ring-emerald-400';
                    else if (isChecked && q.c !== optIdx) bgClass = 'bg-red-50 border-red-300 text-red-800';
                }

                return `
                    <label class="flex items-start gap-4 p-4 rounded-xl border cursor-pointer transition-all ${bgClass}">
                        <input type="radio" name="final_${q.id}" ${submitted ? 'disabled' : ''} ${isChecked ? 'checked' : ''} onchange="setTempAnswerFinalMC(${q.id}, ${optIdx})" class="mt-1 h-5 w-5 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm md:text-base flex-1 leading-relaxed">${opt}</span>
                    </label>
                `;
            }).join('');
        }

        return `
            <div class="bg-white p-6 md:p-8 rounded-3xl border border-slate-200 shadow-[0_4px_20px_rgba(0,0,0,0.03)] mb-6">
                <div class="flex gap-4 items-start mb-6">
                    <span class="w-12 h-12 flex items-center justify-center bg-indigo-100 text-indigo-700 font-black rounded-xl text-xl flex-shrink-0">${idx + 1}</span>

                        <p class="font-bold text-slate-800 text-lg leading-snug">${q.q}</p>
                        ${q.type === 'mcc' ? '<span class="text-xs font-black text-purple-700 bg-purple-100 px-3 py-1.5 rounded-md mt-3 inline-block uppercase tracking-wider"><i class="fas fa-check-double"></i> Pilih lebih dari satu jawaban</span>' : ''}
                    </div>
                </div>
                <div class="space-y-3 pl-0 md:pl-16">${optsHtml}</div>
            </div>
        `;
    }).join('');

    let scoreAlert = '';
    if (submitted) {
        const isLulus = state.finalScore >= 70;
        scoreAlert = `
            <div class="p-8 rounded-3xl mb-10 text-center shadow-lg border-2 ${isLulus ? 'bg-emerald-50 border-emerald-400 shadow-emerald-100' : 'bg-red-50 border-red-400 shadow-red-100'} slide-up">

    }

    return `

            <div class="text-center pb-8 border-b border-slate-200">
                <h2 class="text-4xl md:text-5xl font-extrabold text-slate-800 tracking-tight">Tes Akhir (HOTS)</h2>

            ${scoreAlert}
            <div class="mt-10">${qsHtml}</div>
            ${!submitted ? `<button onclick="submitFinalTest()" class="w-full mt-10 bg-slate-900 hover:bg-black text-white font-bold py-6 rounded-2xl text-2xl shadow-2xl transition-all flex justify-center gap-3 items-center">Kirim Tes Akhir <i class="fas fa-paper-plane"></i></button>` : ''}
        </div>
    `;
}

            e.preventDefault();
            const name = document.getElementById('inputName').value.trim();
            const school = document.getElementById('inputSchool').value.trim();
            if (name && school) {
                state.user = { name, school, isLogged: true };
                state.currentView = 'dashboard';
                render();
            } else {
                showToast('Harap lengkapi form!', 'error');
            }
        });
        return;
    }

    let mainContent = '';
    if (state.currentView === 'dashboard') mainContent = renderDashboard();
    else if (state.currentView.startsWith('m')) mainContent = renderMateri(state.currentView);
    else if (state.currentView === 'activity') mainContent = renderActivity();
    else if (state.currentView === 'plan') mainContent = renderPlan();
    else if (state.currentView === 'final') mainContent = renderFinalTest();
    else if (state.currentView === 'cert') mainContent = renderCertificate();

    appDiv.innerHTML = `
        <div class="flex flex-col md:flex-row w-full font-sans">
            ${renderSidebar()}
            <div class="flex-1 p-4 md:p-10 lg:px-16 lg:py-12 bg-slate-50 min-h-screen no-print">
                <div class="max-w-5xl mx-auto mb-20">
                    ${mainContent}
                </div>
            </div>
        </div>
    `;
}

// LOGIC UTILITIES
function changeView(viewId) {
    state.tempAnswers = {}; 
    if(viewId === 'activity') {
        state.activityQuest.tempAnswers = {}; 
    }
    state.currentView = viewId;
    render();
    window.scrollTo(0, 0);
}

function setTempAnswer(qIdx, optIdx) {
    state.tempAnswers[qIdx] = optIdx;
    render();
}

function submitMateri(id) {
    const data = materiData.find(m => m.id === id);
    let correct = 0;
    
    for (let i = 0; i < 10; i++) {
        if (state.tempAnswers[i] === undefined) {
            showToast("Harap jawab semua pertanyaan!", "error");
            return;
        }
    }

    data.questions.forEach((q, idx) => {
        if (state.tempAnswers[idx] === q.c) correct++;
    });

    state.scores[id] = correct * 10;
    render();
    window.scrollTo(0, document.body.scrollHeight);
}

// Activity logic
function setActivityAnswer(qIdx, optIdx) {
    state.activityQuest.tempAnswers[qIdx] = optIdx;
    render();
}

function submitActivityLevel(lvl) {
    const actData = activityData[lvl - 1];
    
    for (let i = 0; i < 10; i++) {
        if (state.activityQuest.tempAnswers[i] === undefined) {
            showToast("Harap selesaikan seluruh 10 soal di level ini!", "error");
            return;
        }
    }

    let correct = 0;
    actData.q.forEach((q, idx) => {
        if (state.activityQuest.tempAnswers[idx] === q.c) correct++;
    });

    const score = correct * 10;
    state.activityQuest.scores[`l${lvl}`] = score;
    
    let gTotal = 0;
    for(let i=1; i<=5; i++) {
        gTotal += (state.activityQuest.scores[`l${i}`] || 0);
    }
    state.activityQuest.totalPoints = gTotal;
    
    if (score >= 80) {
        showToast(`Hebat! Level ${lvl} Selesai dengan nilai ${score}.`, 'success');
        if (lvl < 5 && state.activityQuest.currentLevel === lvl) {
            state.activityQuest.currentLevel = lvl + 1;
            state.activityQuest.tempAnswers = {}; 
        }
    } else {
        showToast(`Nilai ${score}. Butuh 80 untuk lulus level ini.`, 'error');
    }
    render();
    window.scrollTo(0,0);
}

function retryActivity(lvl) {
    state.activityQuest.scores[`l${lvl}`] = null;
    state.activityQuest.tempAnswers = {};
    render();
}

function changeQuestLevel(lvl) {
    if (lvl > 1 && (state.activityQuest.scores[`l${lvl-1}`] === null || state.activityQuest.scores[`l${lvl-1}`] < 80)) {
        showToast("Selesaikan level sebelumnya dengan nilai minimal 80!", "warning");
        return;
    }
    state.activityQuest.currentLevel = lvl;
    state.activityQuest.tempAnswers = {}; 
    render();
}

// Plan Logic
function savePlan() {
    state.actionPlan = document.getElementById('planText').value;
    showToast("Komitmen Rencana Aksi Disimpan!", "success");
}

// Final Test Logic
function setTempAnswerFinalMC(qId, optIdx) {
    state.tempAnswers[qId] = optIdx;
    render();
}

function setTempAnswerFinalMCC(qId, optIdx, isChecked) {
    if (!state.tempAnswers[qId]) state.tempAnswers[qId] = [];
    if (isChecked) {
        state.tempAnswers[qId].push(optIdx);
    } else {
        state.tempAnswers[qId] = state.tempAnswers[qId].filter(i => i !== optIdx);
    }
    render();
}

function submitFinalTest() {
    let uncompleted = false;
    finalTestHOTS.forEach(q => {
        if (state.tempAnswers[q.id] === undefined || (Array.isArray(state.tempAnswers[q.id]) && state.tempAnswers[q.id].length === 0)) {
            uncompleted = true;
        }
    });

    if (uncompleted) {
        showToast("Mohon jawab seluruh 20 studi kasus.", "warning");
        return;
    }

    let correctCount = 0;
    finalTestHOTS.forEach(q => {
        const userAns = state.tempAnswers[q.id];
        if (q.type === 'mc') {
            if (userAns === q.c) correctCount++;
        } else if (q.type === 'mcc') {
            const correctSet = [...q.a].sort();
            const userSet = [...userAns].sort();
            if (JSON.stringify(correctSet) === JSON.stringify(userSet)) correctCount++;
        }
    });

    state.finalScore = (correctCount / 20) * 100;
    
    if (state.finalScore >= 70) {
        showToast(`LULUS! Skor Anda ${state.finalScore}. Sertifikat terbuka.`, "success");
    } else {
        showToast(`Skor: ${state.finalScore}. Butuh 70 untuk lulus.`, "error");
    }
    render();
    window.scrollTo(0,0);
}

// Inisialisasi Aplikasi
render();
</script>
</body>
