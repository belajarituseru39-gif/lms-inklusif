const appDiv = document.getElementById('app');

function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    const bgClass = type === 'error' ? 'bg-red-500' : (type === 'warning' ? 'bg-amber-500' : 'bg-emerald-500');
    const icon = type === 'error' ? 'fa-exclamation-circle' : (type === 'warning' ? 'fa-info-circle' : 'fa-check-circle');
    
    toast.className = `${bgClass} text-white px-5 py-4 rounded-xl shadow-2xl font-medium flex items-center gap-3 slide-up`;
    toast.innerHTML = `<i class="fas ${icon} text-xl"></i> <span>${msg}</span>`;
    
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-20px)';
        toast.style.transition = 'all 0.4s ease';
        setTimeout(() => toast.remove(), 400);
    }, 3500);
}

        let optsHtml = q.a.map((opt, optIdx) => {

            let bgClass = isChecked ? 'bg-indigo-50 border-indigo-400 ring-1 ring-indigo-400' : 'bg-white border-slate-200 hover:bg-slate-50';
            if (submitted) {
                if (q.c === optIdx) bgClass = 'bg-emerald-50 border-emerald-400 ring-1 ring-emerald-400 font-semibold text-emerald-900';

                    <p class="max-w-3xl text-slate-700 text-xl leading-relaxed mb-8">
                        Telah menuntaskan <b>Tes Akhir (Skor: ${state.finalScore})</b> dan Aktivitas Mandiri dengan Predikat:<br>
                        <span class="font-black text-amber-600 text-3xl block mt-4 px-6 py-2 bg-amber-50 rounded-lg inline-block border border-amber-200">${predText}</span>
                    </p>
                    <p class="font-bold text-slate-500 text-lg italic">"Wujudkan Pendidikan Bermutu Untuk Semua"</p>
                    <div class="w-full flex justify-between px-16 mt-16 pt-8 border-t-2 border-slate-100">
                        <div class="text-center">
                            <p class="text-slate-500 italic mb-6">Diberikan pada tanggal</p>
                            <p class="font-bold text-slate-800 text-xl">${date}</p>
                        </div>
                        <div class="text-center">
                            <p class="text-slate-500 italic mb-6">Penyelenggara Pelatihan</p>
                            <div class="w-48 h-1 bg-slate-800 mx-auto mb-2"></div>
                            <p class="font-bold text-slate-800 text-xl">Direktur Program</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function render() {
    if (!state.user.isLogged) {
        appDiv.innerHTML = renderLogin();
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('inputName').value.trim();
            const school = document.getElementById('inputSchool').value.trim();
            if (name && school) {
                state.user = { name, school, isLogged: true };
                state.currentView = 'dashboard';
                render();
            } else {
                showToast('Harap lengkapi form!', 'error');
            }
        });
        return;
    }

    let mainContent = '';
    if (state.currentView === 'dashboard') mainContent = renderDashboard();
    else if (state.currentView.startsWith('m')) mainContent = renderMateri(state.currentView);
    else if (state.currentView === 'activity') mainContent = renderActivity();
    else if (state.currentView === 'plan') mainContent = renderPlan();
    else if (state.currentView === 'final') mainContent = renderFinalTest();
    else if (state.currentView === 'cert') mainContent = renderCertificate();

    appDiv.innerHTML = `
        <div class="flex flex-col md:flex-row w-full font-sans">
            ${renderSidebar()}
            <div class="flex-1 p-4 md:p-10 lg:px-16 lg:py-12 bg-slate-50 min-h-screen no-print">
                <div class="max-w-5xl mx-auto mb-20">
                    ${mainContent}
                </div>
            </div>
        </div>
    `;
}

// LOGIC UTILITIES
function changeView(viewId) {
    state.tempAnswers = {}; 
    if(viewId === 'activity') {
        state.activityQuest.tempAnswers = {}; 
    }
    state.currentView = viewId;
    render();
    window.scrollTo(0, 0);
}

function setTempAnswer(qIdx, optIdx) {
    state.tempAnswers[qIdx] = optIdx;
    render();
}

function submitMateri(id) {
    const data = materiData.find(m => m.id === id);
    let correct = 0;
    
    for (let i = 0; i < 10; i++) {
        if (state.tempAnswers[i] === undefined) {
            showToast("Harap jawab semua pertanyaan!", "error");
            return;
        }
    }

    data.questions.forEach((q, idx) => {
        if (state.tempAnswers[idx] === q.c) correct++;
    });

    state.scores[id] = correct * 10;
    render();
    window.scrollTo(0, document.body.scrollHeight);
}

// Activity logic
function setActivityAnswer(qIdx, optIdx) {
    state.activityQuest.tempAnswers[qIdx] = optIdx;
    render();
}

function submitActivityLevel(lvl) {
    const actData = activityData[lvl - 1];
    
    for (let i = 0; i < 10; i++) {
        if (state.activityQuest.tempAnswers[i] === undefined) {
            showToast("Harap selesaikan seluruh 10 soal di level ini!", "error");
            return;
        }
    }

    let correct = 0;
    actData.q.forEach((q, idx) => {
        if (state.activityQuest.tempAnswers[idx] === q.c) correct++;
    });

    const score = correct * 10;
    state.activityQuest.scores[`l${lvl}`] = score;
    
    let gTotal = 0;
    for(let i=1; i<=5; i++) {
        gTotal += (state.activityQuest.scores[`l${i}`] || 0);
    }
    state.activityQuest.totalPoints = gTotal;
    
    if (score >= 80) {
        showToast(`Hebat! Level ${lvl} Selesai dengan nilai ${score}.`, 'success');
        if (lvl < 5 && state.activityQuest.currentLevel === lvl) {
            state.activityQuest.currentLevel = lvl + 1;
            state.activityQuest.tempAnswers = {}; 
        }
    } else {
        showToast(`Nilai ${score}. Butuh 80 untuk lulus level ini.`, 'error');
    }
    render();
    window.scrollTo(0,0);
}

function retryActivity(lvl) {
    state.activityQuest.scores[`l${lvl}`] = null;
    state.activityQuest.tempAnswers = {};
    render();
}

function changeQuestLevel(lvl) {
    if (lvl > 1 && (state.activityQuest.scores[`l${lvl-1}`] === null || state.activityQuest.scores[`l${lvl-1}`] < 80)) {
        showToast("Selesaikan level sebelumnya dengan nilai minimal 80!", "warning");
        return;
    }
    state.activityQuest.currentLevel = lvl;
    state.activityQuest.tempAnswers = {}; 
    render();
}

// Plan Logic
function savePlan() {
    state.actionPlan = document.getElementById('planText').value;
    showToast("Komitmen Rencana Aksi Disimpan!", "success");
}

// Final Test Logic
function setTempAnswerFinalMC(qId, optIdx) {
    state.tempAnswers[qId] = optIdx;
    render();
}

function setTempAnswerFinalMCC(qId, optIdx, isChecked) {
    if (!state.tempAnswers[qId]) state.tempAnswers[qId] = [];
    if (isChecked) {
        state.tempAnswers[qId].push(optIdx);
    } else {
        state.tempAnswers[qId] = state.tempAnswers[qId].filter(i => i !== optIdx);
    }
    render();
}

function submitFinalTest() {
    let uncompleted = false;
    finalTestHOTS.forEach(q => {
        if (state.tempAnswers[q.id] === undefined || (Array.isArray(state.tempAnswers[q.id]) && state.tempAnswers[q.id].length === 0)) {
            uncompleted = true;
        }
    });

    if (uncompleted) {
        showToast("Mohon jawab seluruh 20 studi kasus.", "warning");
        return;
    }

    let correctCount = 0;
    finalTestHOTS.forEach(q => {
        const userAns = state.tempAnswers[q.id];
        if (q.type === 'mc') {
            if (userAns === q.c) correctCount++;
        } else if (q.type === 'mcc') {
            const correctSet = [...q.a].sort();
            const userSet = [...userAns].sort();
            if (JSON.stringify(correctSet) === JSON.stringify(userSet)) correctCount++;
        }
    });

    state.finalScore = (correctCount / 20) * 100;
    
    if (state.finalScore >= 70) {
        showToast(`LULUS! Skor Anda ${state.finalScore}. Sertifikat terbuka.`, "success");
    } else {
        showToast(`Skor: ${state.finalScore}. Butuh 70 untuk lulus.`, "error");
    }
    render();
    window.scrollTo(0,0);
}

// Inisialisasi Aplikasi
render();
</script>
</body>
</html>
